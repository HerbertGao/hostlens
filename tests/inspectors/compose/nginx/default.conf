# Recording-lane nginx default site for the wave-2a `nginx.health` fixture.
#
# Overlays nginx:alpine's stock /etc/nginx/conf.d/default.conf (mounted read-only
# by the `nginx` compose service) so the stub_status location lives in the SAME
# `server { listen 80; }` block as the default site — a single server block, no
# duplication.
#
# stub_status is enabled at /stub_status (leading `/`, no trailing slash). The
# host (which has /usr/bin/curl; the alpine container does not) probes it via the
# published host port 18080: `curl -fsS http://127.0.0.1:18080/stub_status`,
# returning the stub_status text (contains `Active connections:`). G5's
# `nginx.health` recorder relies on this path/port — see docker-compose.yml.
server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    location /stub_status {
        stub_status;
    }
}
