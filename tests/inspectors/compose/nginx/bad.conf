# Deliberately INVALID nginx config for the wave-2a `nginx.config_test`
# semantic-abnormal fixture (G5, task 5.5). This file is NEVER mounted on the live
# `nginx` service — that would break it. The recorder (`_record_nginx.py`
# `_record_config_invalid`) mounts it as the EFFECTIVE /etc/nginx/nginx.conf in a
# throwaway container kept alive by `sleep 3600` (so the bad config does not crash
# the entrypoint), then docker-execs a bare `nginx -t` (which validates
# /etc/nginx/nginx.conf = this file):
#
#   docker run -d --name <tmp> -v "<this>:/etc/nginx/nginx.conf:ro" \
#       nginx:1.27.3-alpine sleep 3600
#   docker exec <tmp> nginx -t
#
# `nginx -t` exits rc=1 and writes its verdict to STDERR. The stderr
# naturally contains QUOTES (nginx quotes the offending token) and a BACKSLASH
# (the unknown-directive token `bad\directive` is echoed back verbatim), spread
# over a NEWLINE (the `[emerg]` line + the `configuration file ... test failed`
# line). That quote/backslash/newline triple is exactly what task 5.5 needs to
# prove the collector's `jq -n --arg d "$err"` escaping produces valid JSON
# instead of degrading to an exception. Do NOT "fix" this file.
events {}
http {
    server {
        listen 80;
        bad\directive on;
    }
}
